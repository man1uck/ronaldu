worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # --- Безопасность ---
    server_tokens off;
    include       mime.types;
    default_type  application/octet-stream;

    # --- WebSocket: условный Connection header ---
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --- Лимит запросов ---
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # --- Проксирование ---
    upstream app {
        server app:3000;
    }

    # --- HTTP → HTTPS редирект + ACME challenge ---
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS ---
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # Сертификаты Let's Encrypt (домен подставляется при init-letsencrypt)
        ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

        # TLS настройки
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Заголовки безопасности
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Загрузки до 10МБ
        client_max_body_size 10m;

        # Rate limiting
        limit_req zone=api burst=60 nodelay;

        # Статические загруженные файлы — отдаём напрямую через nginx
        location /uploads/ {
            alias /data/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Таймауты для загрузки файлов
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}